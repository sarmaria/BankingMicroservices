services:
  accounts:
    image: "sarmaria/accounts:v1"
    container_name: accounts-ms
    ports:
      - 8080:8080
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - banking
  loans:
    image: "sarmaria/loans:v1"
    container_name: loans-ms
    ports:
      - 8082:8082
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - banking
  cards:
    image: "sarmaria/cards:v1"
    container_name: cards-ms
    ports:
      - 8081:8081
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - banking
networks:
  banking:
    driver: "bridge"