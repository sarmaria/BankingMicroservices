server:
  port: 8080
spring:
  application:
    name: "accounts"

  profiles:
    active: "prod"

  config:
    import: "optional:configserver:http://localhost:8071/"

  # Temporarily disabling rabbitmq dependencies
  # rabbitmq:
  #   host: "localhost"
  #   port: 5672
  #   username: "guest"
  #   password: "guest"

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:accountsdb
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

#Helps in display of the Eureka Dashboard
info:
  app:
    name: "accounts"
    description: "Banking accounts application"
    version: "1.0.0"
